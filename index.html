<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mathématiques 1ère - Entraînement pour Clara</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg-light: #FAFAFA;
            --primary-yellow: #FBE698;
            --secondary-yellow: #FFF9C4;
            --accent-color: #F39C12;
            --text-dark: #2C3E50;
            --text-light: #7F8C8D;
            --success: #27AE60;
            --danger: #E74C3C;
            --card-bg: #FFFFFF;
            --border-radius: 20px;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--secondary-yellow) 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 800px; /* Adapté iPad, parfait sur iPhone */
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            min-height: 100vh;
            position: relative;
            box-shadow: var(--shadow);
            overflow-x: hidden;
        }

        /* --- Header & Navigation --- */
        header {
            padding: 20px;
            background: var(--card-bg);
            border-bottom-left-radius: var(--border-radius);
            border-bottom-right-radius: var(--border-radius);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            text-align: center;
        }
        
        h1 { font-size: 1.5rem; color: var(--accent-color); font-weight: 800; margin-bottom: 5px; }
        .subtitle { font-size: 0.9rem; color: var(--text-light); }

        .nav-tabs {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        
        .nav-tabs button {
            background: none; border: none; font-size: 0.9rem; font-weight: 600;
            color: var(--text-light); padding: 10px 15px; cursor: pointer;
            border-bottom: 3px solid transparent; transition: 0.3s;
            white-space: nowrap;
        }
        
        .nav-tabs button.active { color: var(--accent-color); border-bottom-color: var(--accent-color); }

        /* --- Screens --- */
        .screen { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Cards & Content --- */
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border-left: 5px solid var(--primary-yellow);
        }

        h2 { font-size: 1.3rem; margin-bottom: 15px; color: var(--text-dark); }
        p { line-height: 1.6; margin-bottom: 15px; }

        /* --- Buttons --- */
        .btn {
            background: linear-gradient(135deg, var(--primary-yellow), var(--accent-color));
            color: white; border: none; padding: 15px 25px;
            border-radius: 12px; font-size: 1rem; font-weight: 600;
            cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
            transition: transform 0.2s; margin-top: 10px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-outline {
            background: transparent; border: 2px solid var(--accent-color);
            color: var(--accent-color); box-shadow: none;
        }

        /* --- QCM Styles --- */
        .qcm-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .qcm-option {
            background: var(--bg-light); border: 2px solid #E0E0E0;
            border-radius: 10px; padding: 15px; text-align: center;
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .qcm-option.selected { border-color: var(--accent-color); background: var(--secondary-yellow); }
        .qcm-option.correct { border-color: var(--success); background: #E8F8F5; color: var(--success); }
        .qcm-option.wrong { border-color: var(--danger); background: #FDEDEC; color: var(--danger); }

        /* --- Corrections --- */
        .correction-box {
            background: #F8F9F9; border-left: 4px solid var(--success);
            padding: 15px; border-radius: 8px; margin-top: 15px;
            display: none; font-size: 0.95rem;
        }
        .correction-box.show { display: block; animation: fadeIn 0.3s ease; }

        /* --- Menu principal --- */
        .menu-grid { display: grid; gap: 15px; margin-top: 30px; }
        .menu-item {
            background: var(--card-bg); padding: 30px; border-radius: var(--border-radius);
            text-align: center; cursor: pointer; box-shadow: var(--shadow);
            border: 2px solid transparent; transition: 0.3s;
        }
        .menu-item:hover, .menu-item:active { border-color: var(--accent-color); transform: translateY(-3px); }
        .menu-item h3 { font-size: 1.4rem; margin-bottom: 5px; }

        /* SVG & Schemas */
        .schema-container { text-align: center; margin: 20px 0; overflow-x: auto; background: white; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
        .fraction { display: inline-block; text-align: center; vertical-align: middle; margin: 0 5px; }
        .fraction > span { display: block; padding: 0.1em; }
        .fraction span.fdn { border-top: 1px solid #000; }
    </style>
</head>
<body>

<div id="app">
    <header id="main-header" style="display: none;">
        <h1>Excellence Clara 🚀</h1>
        <div class="subtitle" id="header-subtitle">Épreuve 1</div>
        <div class="nav-tabs" id="nav-tabs">
            <button onclick="changeTab('auto')" id="tab-auto" class="active">Automatisme</button>
            <button onclick="changeTab('exo1')" id="tab-exo1">Exo 1 (Fonctions)</button>
            <button onclick="changeTab('exo2')" id="tab-exo2">Exo 2 (Suites/Proba)</button>
            <button onclick="changeTab('exo3')" id="tab-exo3">Exo 3 (Géométrie)</button>
            <button onclick="goHome()">🏠 Quitter</button>

    <div id="screen-home" class="screen active" style="padding-top: 50px; text-align: center;">
        <h1 style="font-size: 2.2rem;">Salut Clara ! 👋</h1>
        <p style="color: var(--text-light); margin-top: 10px;">Choisis ton épreuve d'entraînement d'aujourd'hui.</p>
        
        <div class="menu-grid">
            <div class="menu-item" onclick="startEpreuve(1)">
                <h3>Épreuve 1</h3>
                <p>Le grand classique pour s'échauffer</p>
            </div>
            <div class="menu-item" onclick="startEpreuve(2)">

        </div>
    </div>

    <div id="screen-auto" class="screen"></div>
    <div id="screen-exo1" class="screen"></div>

</div>

<script>
// ==========================================
// BANQUE DE DONNÉES DES ÉPREUVES

const db = {
    1: {
        title: "Épreuve 1",
        auto: [
            { q: "Calculer et simplifier : $3 - \\frac{5}{2}$", opts: ["$\\frac{1}{2}$", "$\\frac{-2}{2}$", "$\\frac{6}{2}$", "$1$"], ans: 0, 
              corr: "Pour soustraire, on met au même dénominateur : $3 = \\frac{6}{2}$. Donc $\\frac{6}{2} - \\frac{5}{2} = \\frac{1}{2}$." },
            { q: "Résoudre l'équation : $3x + 4 = 10$", opts: ["$x = 2$", "$x = -2$", "$x = 3$", "$x = 6$"], ans: 0,

            { q: "Quelles sont les solutions de $x^2 - 5x + 6 = 0$ ?", opts: ["1 et 6", "-2 et -3", "2 et 3", "Pas de solution"], ans: 2, 
              corr: "On calcule le discriminant $\\Delta = (-5)^2 - 4(1)(6) = 25 - 24 = 1$. Les racines sont $x_1 = \\frac{5-1}{2} = 2$ et $x_2 = \\frac{5+1}{2} = 3$." },
            { q: "Résoudre l'inéquation : $-2x + 4 > 0$", opts: ["$x > 2$", "$x < 2$", "$x > -2$", "$x < -2$"], ans: 1, 
              corr: "$-2x > -4$. On divise par $-2$ (un nombre négatif !), le sens de l'inégalité change : $x < 2$." },
            { q: "Calculer : $\\frac{2}{3} - \\frac{1}{4}$", opts: ["$\\frac{1}{12}$", "$\\frac{1}{-1}$", "$\\frac{5}{12}$", "$\\frac{11}{12}$"], ans: 2, 
              corr: "Dénominateur commun $12$. $\\frac{2 \\times 4}{12} - \\frac{1 \\times 3}{12} = \\frac{8}{12} - \\frac{3}{12} = \\frac{5}{12}$." },
            { q: "Comparer les réels : $\\sqrt{2}$ et $1,41$", opts: ["$\\sqrt{2} < 1,41$", "$\\sqrt{2} = 1,41$", "$\\sqrt{2} > 1,41$", "Incomparables"], ans: 2, 
              corr: "On sait que $\\sqrt{2} \\approx 1,414...$ Donc $\\sqrt{2} > 1,41$." },
            { q: "Clara a eu 12 (coeff 2) et une note $x$ (coeff 1). Sa moyenne pondérée est 14. Que vaut $x$ ?", opts: ["14", "16", "18", "20"], ans: 2, 
              corr: "La moyenne est $\\frac{12 \\times 2 + x \\times 1}{3} = 14$. Donc $\\frac{24 + x}{3} = 14 \\iff 24 + x = 42 \\iff x = 18$." },
            { q: "Que vaut $\\cos(\\frac{\\pi}{3})$ ?", opts: ["$\\frac{1}{2}$", "$\\frac{\\sqrt{2}}{2}$", "$\\frac{\\sqrt{3}}{2}$", "$1$"], ans: 0, 
              corr: "C'est une valeur remarquable du cercle trigonométrique à connaître par cœur : $\\cos(\\frac{\\pi}{3}) = \\frac{1}{2}$." },
            { q: "Calculer le produit scalaire $\\vec{u}(2 ; 3) \\cdot \\vec{v}(-1 ; 4)$", opts: ["14", "10", "5", "11"], ans: 1, 
              corr: "Formule analytique : $xx' + yy' = 2 \\times (-1) + 3 \\times 4 = -2 + 12 = 10$." },
            { q: "Quelle est la dérivée de $f(x) = x^3 - 2x + 1$ ?", opts: ["$3x^2 - 2$", "$3x^2 - 2x$", "$x^2 - 2$", "$3x^2 + 1$"], ans: 0, 
              corr: "La dérivée de $x^n$ est $nx^{n-1}$. Dérivée de $x^3 \\rightarrow 3x^2$. Dérivée de $-2x \\rightarrow -2$. Dérivée de $1 \\rightarrow 0$." },
            { q: "Simplifier $\\frac{1}{x} + \\frac{1}{x+1}$", opts: ["$\\frac{2}{2x+1}$", "$\\frac{2x+1}{x(x+1)}$", "$\\frac{x+2}{x^2+1}$", "$\\frac{1}{x(x+1)}$"], ans: 1, 
              corr: "On met au même dénominateur $x(x+1)$. Cela donne $\\frac{x+1}{x(x+1)} + \\frac{x}{x(x+1)} = \\frac{2x+1}{x(x+1)}$." },
            { q: "Signe du trinôme $-x^2 + 4$ sur $\\mathbb{R}$", opts: ["Toujours +", "Toujours -", "+ entre -2 et 2", "- entre -2 et 2"], ans: 2, 
              corr: "Les racines sont -2 et 2. Le coefficient $a = -1$ (négatif), donc c'est positif À L'INTÉRIEUR des racines (+ entre -2 et 2)." }
        ],
        exo1: {
            title: "Exercice 1 : Étude de fonction",
            text: "Soit la fonction $f$ définie sur $\\mathbb{R}$ par $f(x) = -2x^3 + 3x^2 + 12x - 5$.<br><br>1. Calculer l'image de 0 et l'image de 1 par $f$.<br>2. Calculer l'expression de la dérivée $f'(x)$.<br>3. Étudier le signe de $f'(x)$.<br>4. En déduire le tableau de variation de $f$.<br>5. Déterminer l'équation de la tangente $T$ au point d'abscisse $x_0 = 0$.",
            corr: "<b>1. Images :</b><br>$f(0) = -5$<br>$f(1) = -2(1)^3 + 3(1)^2 + 12(1) - 5 = -2 + 3 + 12 - 5 = 8$.<br><br><b>2. Dérivée :</b><br>$f'(x) = -2(3x^2) + 3(2x) + 12 = -6x^2 + 6x + 12$.<br><br><b>3. Signe de la dérivée :</b><br>C'est un polynôme du 2nd degré. On calcule $\\Delta = 6^2 - 4(-6)(12) = 36 + 288 = 324$.<br>$\\sqrt{\\Delta} = 18$.<br>Racines : $x_1 = \\frac{-6-18}{-12} = 2$ et $x_2 = \\frac{-6+18}{-12} = -1$.<br>Le coefficient $a$ est $-6$ (négatif), donc $f'(x) > 0$ entre les racines $]-1 ; 2[$.<br><br><b>4. Variations :</b><br>Puisque $f'(x)$ est négative, puis positive, puis négative, $f$ est décroissante sur $]-\\infty ; -1]$, croissante sur $[-1 ; 2]$, et décroissante sur $[2 ; +\\infty[$.<br><br><b>5. Tangente en $x_0 = 0$ :</b><br>Formule : $y = f'(0)(x - 0) + f(0)$.<br>On sait que $f'(0) = 12$ et $f(0) = -5$.<br>Donc l'équation est : $y = 12x - 5$."
        },
        exo2: {
            title: "Exercice 2 : La Pâtisserie de Clara (Suites & Probas)",
            text: "Clara a ouvert une formidable pâtisserie. Chaque jour, elle prépare un gâteau signature exclusif.<br><br>Si elle vend son gâteau un jour donné, la probabilité qu'elle le vende le lendemain est de $0,8$. Si elle ne le vend pas, la probabilité de le vendre le lendemain chute à $0,4$. Le premier jour (jour 1), elle a vendu son gâteau, donc $p_1 = 1$.<br>On note $p_n$ la probabilité qu'elle vende le gâteau le jour $n$.<br><br><b>1.</b> Modéliser la situation pour le jour $n$ et $n+1$ par un arbre de probabilité.<br><b>2.</b> Montrer que pour tout entier $n \\ge 1$, $p_{n+1} = 0,4p_n + 0,4$.<br><b>3.</b> On pose $u_n = p_n - \\frac{2}{3}$. Montrer que $(u_n)$ est une suite géométrique dont on donnera la raison.<br><b>4.</b> Exprimer $u_n$ puis $p_n$ en fonction de $n$.<br><b>5.</b> Clara vendra-t-elle ce gâteau indéfiniment ? (Calculer la limite de $p_n$).",
            corr: "<b>1. Arbre de probabilité :</b><br><div class='schema-container'><svg width='200' height='150' viewBox='0 0 200 150'><path d='M 20 75 L 80 30' stroke='#333' fill='none'/><path d='M 20 75 L 80 120' stroke='#333' fill='none'/><text x='90' y='35'>Vendu (0,8)</text><text x='90' y='125'>Non vendu (0,2)</text><text x='10' y='75'>Jour n</text></svg></div>(Si vendu au jour $n$, proba 0,8 au jour $n+1$. Si non vendu, proba 0,4.)<br><br><b>2. Expression de $p_{n+1}$ :</b><br>D'après la formule des probabilités totales :<br>$p_{n+1} = p_n \\times 0,8 + (1 - p_n) \\times 0,4 = 0,8p_n + 0,4 - 0,4p_n = 0,4p_n + 0,4$.<br><br><b>3. Suite géométrique :</b><br>$u_{n+1} = p_{n+1} - \\frac{2}{3} = (0,4p_n + 0,4) - \\frac{2}{3}$.<br>Or $0,4 = \\frac{4}{10} = \\frac{2}{5}$.<br>$u_{n+1} = \\frac{2}{5}p_n + \\frac{2}{5} - \\frac{2}{3} = \\frac{2}{5}p_n + \\frac{6 - 10}{15} = \\frac{2}{5}p_n - \\frac{4}{15}$.<br>On factorise par $\\frac{2}{5}$ :<br>$u_{n+1} = \\frac{2}{5}(p_n - \\frac{2}{3}) = \\frac{2}{5} u_n$.<br>La suite $(u_n)$ est géométrique de raison $q = 0,4$.<br><br><b>4. Expression explicite :</b><br>$u_1 = p_1 - \\frac{2}{3} = 1 - \\frac{2}{3} = \\frac{1}{3}$.<br>$u_n = u_1 \\times q^{n-1} = \\frac{1}{3} \\times (0,4)^{n-1}$.<br>Comme $p_n = u_n + \\frac{2}{3}$, on a : $p_n = \\frac{1}{3}(0,4)^{n-1} + \\frac{2}{3}$.<br><br><b>5. Limite :</b><br>Comme $-1 < 0,4 < 1$, la limite de $(0,4)^{n-1}$ quand $n$ tend vers l'infini est $0$. Donc $\\lim p_n = \\frac{2}{3} \\approx 0,67$. À long terme, Clara aura 67% de chances de vendre son gâteau chaque jour !"
        },
        exo3: {
            title: "Exercice 3 : Géométrie Plane Analytique",
            text: "Dans un repère orthonormé, on donne les points $A(-1 ; 2)$, $B(3 ; 4)$ et $C(2 ; -1)$.<br><br><b>1.</b> Calculer les coordonnées des vecteurs $\\vec{AB}$ et $\\vec{AC}$.<br><b>2.</b> Calculer le produit scalaire $\\vec{AB} \\cdot \\vec{AC}$.<br><b>3.</b> Déterminer les longueurs $AB$ et $AC$. En déduire la valeur de $\\cos(\\widehat{BAC})$.<br><b>4.</b> Déterminer les coordonnées du milieu $I$ de $[BC]$.<br><b>5.</b> Déterminer une équation cartésienne de la hauteur issue de $A$ dans le triangle $ABC$.",
            corr: "<b>1. Coordonnées des vecteurs :</b><br>$\\vec{AB}(3 - (-1) ; 4 - 2)$ donc $\\vec{AB}(4 ; 2)$.<br>$\\vec{AC}(2 - (-1) ; -1 - 2)$ donc $\\vec{AC}(3 ; -3)$.<br><br><b>2. Produit scalaire :</b><br>$\\vec{AB} \\cdot \\vec{AC} = 4 \\times 3 + 2 \\times (-3) = 12 - 6 = 6$.<br><br><b>3. Longueurs et cosinus :</b><br>$AB = \\sqrt{4^2 + 2^2} = \\sqrt{20} = 2\\sqrt{5}$.<br>$AC = \\sqrt{3^2 + (-3)^2} = \\sqrt{18} = 3\\sqrt{2}$.<br>On sait que $\\vec{AB} \\cdot \\vec{AC} = AB \\times AC \\times \\cos(\\widehat{BAC})$.<br>$6 = \\sqrt{20} \\times \\sqrt{18} \\times \\cos(\\widehat{BAC}) = \\sqrt{360} \\times \\cos(\\widehat{BAC}) = 6\\sqrt{10} \\times \\cos(\\widehat{BAC})$.<br>Donc $\\cos(\\widehat{BAC}) = \\frac{6}{6\\sqrt{10}} = \\frac{1}{\\sqrt{10}} = \\frac{\\sqrt{10}}{10}$.<br><br><b>4. Milieu I de [BC] :</b><br>$x_I = \\frac{3 + 2}{2} = 2,5$. $y_I = \\frac{4 + (-1)}{2} = 1,5$. Donc $I(2,5 ; 1,5)$.<br><br><b>5. Équation de la hauteur issue de A :</b><br>La hauteur issue de $A$ est la droite passant par $A$ et orthogonale à $(BC)$.<br>Vecteur normal : $\\vec{BC}(2 - 3 ; -1 - 4)$ soit $\\vec{BC}(-1 ; -5)$.<br>L'équation de la hauteur est de la forme $-1x - 5y + c = 0$.<br>Elle passe par $A(-1 ; 2)$, donc $-1(-1) - 5(2) + c = 0 \\iff 1 - 10 + c = 0 \\iff c = 9$.<br>L'équation cartésienne est : $-x - 5y + 9 = 0$ ou $x + 5y - 9 = 0$."
        }

        ],
        exo1: { title: "Exercice 1 : Fonctions", text: "Étudier $g(x) = x^2 - 4x + 3$.", corr: "Dérivée $g'(x)=2x-4$. Racine en $x=2$. Fonction décroissante puis croissante." },

        ],
        exo1: { title: "Exercice 1", text: "Le défi Ultime des fonctions.", corr: "Corrigé détaillé." },

let currentEpreuveId = 1;

// ==========================================
// MOTEUR DE L'APPLICATION
// ==========================================

function startEpreuve(id) {
    currentEpreuveId = id;
    const ep = db[id];
    
    document.getElementById('header-subtitle').innerText = ep.title;
    
    // Générer l'Automatisme
    let autoHTML = `<h2>🧠 Automatisme (QCM)</h2><p>Coche la bonne réponse, la correction s'affiche immédiatement !</p>`;
    ep.auto.forEach((q, index) => {
        autoHTML += `
            <div class="card" id="qcm-${index}">
                <p><b>Q${index+1}.</b> ${q.q}</p>
                <div class="qcm-options">
                    ${q.opts.map((opt, i) => `<div class="qcm-option" onclick="checkAnswer(${index}, ${i}, ${q.ans})">${opt}</div>`).join('')}
                </div>
                <div class="correction-box" id="corr-qcm-${index}">
                    <b>Correction :</b><br> ${q.corr}
                </div>
            </div>
        `;
    });
    autoHTML += `<button class="btn" onclick="changeTab('exo1')">Passer à l'Exercice 1 ➔</button>`;
    document.getElementById('screen-auto').innerHTML = autoHTML;

    // Générer les Exercices
    ['exo1', 'exo2', 'exo3'].forEach(exoId => {
        const exo = ep[exoId];
        document.getElementById(`screen-${exoId}`).innerHTML = `
            <div class="card">
                <h2>${exo.title}</h2>
                <p>${exo.text}</p>
                <button class="btn btn-outline" id="btn-corr-${exoId}" onclick="toggleCorr('${exoId}')">👁️ Voir le corrigé détaillé</button>
                <div class="correction-box" id="corr-${exoId}" style="margin-top: 20px; border-left-color: var(--accent-color);">
                    <b>Correction détaillée de Clara :</b><br><br>
                    ${exo.corr}
                </div>
            </div>
            ${exoId === 'exo3' ? `<button class="btn" onclick="goHome()">Bravo Clara ! Retourner au menu 🏆</button>` : `<button class="btn" onclick="changeTab('${exoId === 'exo1' ? 'exo2' : 'exo3'}')">Exercice Suivant ➔</button>`}
        `;
    });

    document.getElementById('main-header').style.display = 'block';
    document.getElementById('screen-home').classList.remove('active');
    changeTab('auto');

    // Rafraichir LaTeX
    if(window.MathJax) MathJax.typesetPromise();
}

function checkAnswer(qIndex, selectedOpt, correctOpt) {
    const qcmCard = document.getElementById(`qcm-${qIndex}`);
    const options = qcmCard.querySelectorAll('.qcm-option');
    
    // Désactiver le clic après réponse
    if(qcmCard.classList.contains('answered')) return;
    qcmCard.classList.add('answered');

    options.forEach((opt, idx) => {
        if(idx === correctOpt) {
            opt.classList.add('correct');
        } else if (idx === selectedOpt && selectedOpt !== correctOpt) {
            opt.classList.add('wrong');
        }
        opt.style.pointerEvents = 'none';
    });

    // Afficher la correction
    document.getElementById(`corr-qcm-${qIndex}`).classList.add('show');
    if(window.MathJax) MathJax.typesetPromise();
}

function toggleCorr(exoId) {
    const box = document.getElementById(`corr-${exoId}`);
    const btn = document.getElementById(`btn-corr-${exoId}`);
    if(box.classList.contains('show')) {
        box.classList.remove('show');
        btn.innerHTML = "👁️ Voir le corrigé détaillé";
    } else {
        box.classList.add('show');
        btn.innerHTML = "🙈 Cacher le corrigé";
    }
    if(window.MathJax) MathJax.typesetPromise();
}

function changeTab(tabId) {
    // UI Boutons
    document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${tabId}`).classList.add('active');

    // UI Écrans
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(`screen-${tabId}`).classList.add('active');
    window.scrollTo(0, 0);
}

function goHome() {
    document.getElementById('main-header').style.display = 'none';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-home').classList.add('active');
}
</script>

</body>
</html>
